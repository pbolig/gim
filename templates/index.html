<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIM - Entrenamiento Inteligente</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            flex: 1;
            padding: 0 1.5rem 5rem;
        }

        .welcome-msg h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .welcome-msg p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .routine-grid {
            margin-top: 2.5rem;
            display: grid;
            gap: 1.5rem;
        }

        .routine-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s ease;
        }

        .routine-card:active {
            transform: scale(0.98);
        }

        .routine-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
        }

        .routine-info span {
            color: var(--text-dim);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Barra de Spotify Estilo Flotante */
        .spotify-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .spotify-bar:hover {
            transform: translateX(-50%) translateY(-5px);
            border-color: #1db954;
            box-shadow: 0 15px 50px rgba(29, 185, 84, 0.2);
        }

        .spotify-icon {
            color: #1db954;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 50%;
        }

        .spotify-info {
            flex: 1;
            overflow: hidden;
        }

        .spotify-status {
            font-size: 0.65rem;
            font-weight: 800;
            color: #1db954;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .spotify-track {
            font-size: 0.85rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        /* Playlist Modal */
        #playlist-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 2rem;
            backdrop-filter: blur(15px);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .playlist-list {
            display: grid;
            gap: 1rem;
            overflow-y: auto;
        }

        .playlist-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-item:active {
            transform: scale(0.97);
        }

        .playlist-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="playlist-modal">
        <div class="playlist-header">
            <h2>Tus Playlists</h2>
            <span class="material-symbols-rounded" onclick="closePlaylists()" style="cursor: pointer;">close</span>
        </div>
        <div id="playlists-container" class="playlist-list">
            <!-- Playlists here -->
        </div>
    </div>

    <header>
        <div class="logo">GIM.APP</div>
        <a href="/logout/" style="color: inherit; text-decoration: none;">
            <span class="material-symbols-rounded">logout</span>
        </a>
    </header>

    <main>
        <div class="welcome-msg">
            <h1>¡Hola!</h1>
            <p>¿Qué vamos a entrenar hoy?</p>
        </div>

        <div class="personal-section" style="margin-bottom: 2rem;">
            <h2 style="margin-bottom: 1rem; color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Tu Espacio</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <a href="/mis-rutinas/" class="routine-card" style="background: linear-gradient(135deg, #6366f1, #a855f7); border: none;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">📋</div>
                    <div style="font-weight: 600;">Mis Rutinas</div>
                    <div style="font-size: 0.75rem; opacity: 0.8;">Crear y editar</div>
                </a>
                <a href="/mis-ejercicios/" class="routine-card" style="background: linear-gradient(135deg, #f59e0b, #ef4444); border: none;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">💪</div>
                    <div style="font-weight: 600;">Mis Ejercicios</div>
                    <div style="font-size: 0.75rem; opacity: 0.8;">Personalizados</div>
                </a>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem; color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Explorar Rutinas</h2>
        <div id="routine-list" class="routine-grid">
            <!-- Cargando... -->
            <div class="loader" id="loader">Cargando tus rutinas...</div>
        </div>

        <footer id="version-footer" onclick="forceRefresh()" style="margin-top: 8rem; margin-bottom: 10rem; text-align: center; color: var(--text-dim); font-size: 0.7rem; opacity: 0.5; cursor: pointer;">
            v20260515-UPDATED
        </footer>
    </main>

    <div id="spotify-bar" class="spotify-bar" onclick="window.location.href='/spotify/login/'">
        <div class="spotify-icon">
            <span class="material-symbols-rounded">library_music</span>
        </div>
        <div class="spotify-info">
            <div class="spotify-status">SPOTIFY READY</div>
            <div class="spotify-track">Conecta tu cuenta para sincronizar</div>
        </div>
    </div>

    <script>
        async function loadRoutines() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('routine-list');
            
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/rutinas/');
                const routines = await response.json();
                
                grid.innerHTML = '';
                
                if (routines.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:var(--text-dim)">No hay rutinas creadas aún. Entra al admin para agregar una.</p>';
                }

                routines.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'routine-card';
                    card.innerHTML = `
                        <div class="routine-info">
                            <h3>${r.nombre}</h3>
                            <span><span class="material-symbols-rounded" style="font-size:1rem">exercise</span> ${r.ejercicios.length} ejercicios</span>
                        </div>
                        <button class="start-btn" onclick="startWorkout(${r.id})">Empezar Entrenamiento</button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = '<p style="color: #ef4444">Error al cargar las rutinas.</p>';
            } finally {
                loader.style.display = 'none';
            }
        }

        async function forceRefresh() {
            if (confirm('¿Quieres forzar la actualización de la app? Se borrará el caché y se reiniciará.')) {
                // Unregister all service workers
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }
                // Clear all caches
                const cacheNames = await caches.keys();
                for (let name of cacheNames) {
                    await caches.delete(name);
                }
                // Reload
                window.location.reload(true);
            }
        }

        function startWorkout(id) {
            window.location.href = `/workout/?id=${id}`;
        }

        async function updateSpotifyBar() {
            try {
                const response = await fetch('/api/spotify/status/');
                const data = await response.json();
                
                const statusEl = document.querySelector('.spotify-status');
                const trackEl = document.querySelector('.spotify-track');
                const barEl = document.getElementById('spotify-bar');

                if (data.track_name) {
                    statusEl.innerText = data.is_playing ? 'SONANDO EN ' + data.device_name.toUpperCase() : 'PAUSADO';
                    trackEl.innerText = `${data.track_name} - ${data.artist_name}`;
                    barEl.onclick = openPlaylists; // Cambiado a abrir playlists
                } else if (data.is_connected) {
                    statusEl.innerText = 'SPOTIFY CONECTADO';
                    trackEl.innerText = 'Toca para elegir una Playlist';
                    barEl.onclick = openPlaylists; // Cambiado a abrir playlists
                }
            } catch (err) {
                console.error('Spotify status error:', err);
            }
        }

        async function openPlaylists() {
            const modal = document.getElementById('playlist-modal');
            const container = document.getElementById('playlists-container');
            modal.style.display = 'flex';
            container.innerHTML = '<p style="text-align:center">Cargando tus listas...</p>';

            try {
                const response = await fetch('/api/spotify/playlists/');
                const data = await response.json();
                
                container.innerHTML = '';
                data.playlists.forEach(pl => {
                    const item = document.createElement('div');
                    item.className = 'playlist-item';
                    item.onclick = () => playPlaylist(pl.uri);
                    item.innerHTML = `
                        <img src="${pl.images[0]?.url || ''}" alt="">
                        <div style="flex:1">
                            <div style="font-weight:600">${pl.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-dim)">${pl.tracks.total} canciones</div>
                        </div>
                        <span class="material-symbols-rounded" style="color:var(--primary)">play_circle</span>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = '<p>Error al cargar playlists.</p>';
            }
        }

        function closePlaylists() {
            document.getElementById('playlist-modal').style.display = 'none';
        }

        async function playPlaylist(uri) {
            try {
                const response = await fetch(`/api/spotify/play-playlist/${uri}/`);
                const data = await response.json();
                if (data.status === 'ok') {
                    closePlaylists();
                    setTimeout(updateSpotifyBar, 1000);
                } else {
                    alert('Error al reproducir. Asegúrate de tener Spotify abierto en algún dispositivo.');
                }
            } catch (err) {
                alert('Error de conexión.');
            }
        }
        setInterval(updateSpotifyBar, 5000);
        updateSpotifyBar();

        // Cargar al iniciar
        window.onload = loadRoutines;

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
