<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenando - GIM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none; /* Disable default touch behaviors for Hammer.js */
        }

        #workout-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .state-label {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .exercise-name {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .technique-tip {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 2rem;
            max-width: 300px;
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin: 2rem 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sets-info {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .controls-hint {
            position: fixed;
            bottom: 3rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.6;
        }

        /* State colors */
        body.state-prep { --primary: var(--warning); }
        body.state-work { --primary: var(--success); }
        body.state-rest { --primary: var(--accent); }

        #finish-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .big-icon {
            font-size: 5rem;
            color: var(--success);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="state-prep">
    <div id="workout-container">
        <div id="state-label" class="state-label">Preparate</div>
        <div id="exercise-name" class="exercise-name">Cargando...</div>
        <div id="technique-tip" class="technique-tip"></div>
        
        <div id="timer-display" class="timer-display">00</div>
        
        <div class="sets-info">
            <span id="current-set">Serie 1</span>
            <span style="opacity: 0.3">/</span>
            <span id="total-sets" style="color: var(--text-dim)">3</span>
        </div>

        <div class="controls-hint">
            <span class="material-symbols-rounded">touch_app</span>
            Toca para siguiente • Desliza para pausar
        </div>
    </div>

    <div id="finish-screen">
        <span class="material-symbols-rounded big-icon">check_circle</span>
        <h1>¡Entrenamiento Terminado!</h1>
        <p style="color: var(--text-dim); margin-bottom: 2rem">Lo hiciste increíble.</p>
        <button onclick="window.location.href='/'" style="background: var(--primary); color: white; border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: 700;">VOLVER AL INICIO</button>
    </div>

    <script>
        const routineId = new URLSearchParams(window.location.search).get('id');
        let routineData = null;
        let currentExerciseIndex = 0;
        let currentSet = 1;
        let timerSeconds = 0;
        let timerInterval = null;
        let state = 'PREP'; // PREP, WORK, REST
        let wakeLock = null;

        // Web Speech
        const synth = window.speechSynthesis;
        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-ES';
            utter.rate = 1;
            synth.speak(utter);
        }

        // Wake Lock
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        async function init() {
            if (!routineId) return window.location.href = '/';
            
            try {
                const response = await fetch(`/api/rutinas/${routineId}/`);
                routineData = await response.json();
                startStatePrep();
                requestWakeLock();
            } catch (error) {
                alert('Error al cargar la rutina');
            }
        }

        function updateUI() {
            const ex = routineData.ejercicios[currentExerciseIndex];
            document.getElementById('exercise-name').innerText = ex.ejercicio.nombre;
            document.getElementById('technique-tip').innerText = ex.ejercicio.descripcion_tecnica;
            document.getElementById('current-set').innerText = `Serie ${currentSet}`;
            document.getElementById('total-sets').innerText = ex.series;
            document.getElementById('timer-display').innerText = timerSeconds.toString().padStart(2, '0');
            
            document.body.className = `state-${state.toLowerCase()}`;
            document.getElementById('state-label').innerText = 
                state === 'PREP' ? 'Preparate' : (state === 'WORK' ? '¡Dale!' : 'Descanso');
        }

        function startTimer(seconds, onComplete) {
            clearInterval(timerInterval);
            timerSeconds = seconds;
            updateUI();
            
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateUI();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    onComplete();
                }
            }, 1000);
        }

        function startStatePrep() {
            state = 'PREP';
            const ex = routineData.ejercicios[currentExerciseIndex].ejercicio.nombre;
            speak(`Preparate para ${ex}`);
            startTimer(5, startStateWork);
        }

        function startStateWork() {
            state = 'WORK';
            speak("¡Yaaaa!");
            fetch('/api/spotify/play/').catch(console.error);
            updateUI();
        }

        function nextStep() {
            if (state === 'WORK') {
                state = 'REST';
                speak("¡Listo! Descansá.");
                fetch('/api/spotify/pause/').catch(console.error);
                startTimer(45, () => {
                    const ex = routineData.ejercicios[currentExerciseIndex];
                    if (currentSet < ex.series) {
                        currentSet++;
                        startStatePrep();
                    } else {
                        if (currentExerciseIndex < routineData.ejercicios.length - 1) {
                            currentExerciseIndex++;
                            currentSet = 1;
                            startStatePrep();
                        } else {
                            finishWorkout();
                        }
                    }
                });
            } else if (state === 'REST') {
                // Saltar descanso
                clearInterval(timerInterval);
                const ex = routineData.ejercicios[currentExerciseIndex];
                if (currentSet < ex.series) {
                    currentSet++;
                    startStatePrep();
                } else if (currentExerciseIndex < routineData.ejercicios.length - 1) {
                    currentExerciseIndex++;
                    currentSet = 1;
                    startStatePrep();
                } else {
                    finishWorkout();
                }
            }
        }

        function finishWorkout() {
            state = 'FINISH';
            document.getElementById('finish-screen').style.display = 'flex';
            speak("Entrenamiento terminado. ¡Excelente trabajo!");
            if (wakeLock) wakeLock.release();
        }

        // Hammer.js Gestures
        const mc = new Hammer(document.body);
        mc.on("tap", () => {
            if (state === 'WORK' || state === 'REST') nextStep();
        });

        mc.on("swipe", () => {
            alert("Entrenamiento pausado (Próximamente)");
        });

        init();
    </script>
</body>
</html>
