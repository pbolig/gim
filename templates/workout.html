<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenando - GIM (v2)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }


        .state-label {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .exercise-name {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .video-container {
            width: 100%;
            max-width: 300px;
            height: 180px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-container img { width: 100%; height: 100%; object-fit: cover; }

        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin: 1.5rem 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sets-info {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Input Log Overlay */
        #workout-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            padding-bottom: 140px; /* Espacio para la barra de Spotify */
        }

        /* Barra de Spotify Estilo Flotante */
        .spotify-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .spotify-bar:hover {
            transform: translateX(-50%) translateY(-5px);
            border-color: #1db954;
            box-shadow: 0 15px 50px rgba(29, 185, 84, 0.2);
        }

        .spotify-icon {
            color: #1db954;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 50%;
        }

        .spotify-info {
            flex: 1;
            overflow: hidden;
        }

        .spotify-status {
            font-size: 0.65rem;
            font-weight: 800;
            color: #1db954;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .spotify-track {
            font-size: 0.85rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        /* Playlist Modal */
        #playlist-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 2rem;
            backdrop-filter: blur(15px);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .playlist-list {
            display: grid;
            gap: 1rem;
            overflow-y: auto;
        }

        .playlist-item {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-item:active {
            transform: scale(0.97);
        }

        .playlist-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
        }

        #log-overlay {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: #1e293b;
            padding: 2rem;
            transition: bottom 0.4s;
            z-index: 1500;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        #log-overlay.active {
            bottom: 0;
        }
        #pause-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.9);
            z-index: 1600;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #log-overlay.active { bottom: 0; }

        .log-inputs {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .input-box {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.5rem; font-weight: 700; text-align: center; font-family: inherit; outline: none; }

        body.state-prep { --primary: var(--warning); }
        body.state-work { --primary: var(--success); }
        body.state-rest { --primary: var(--accent); }

        #finish-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            width: 100%;
            max-width: 350px;
            margin: 2rem 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 20px;
        }
    </style>
</head>
<body class="state-prep">
    <div id="playlist-modal">
        <div class="playlist-header">
            <h2>Tus Playlists</h2>
            <span class="material-symbols-rounded" onclick="closePlaylists()" style="cursor: pointer;">close</span>
        </div>
        <div id="playlists-container" class="playlist-list">
            <!-- Playlists here -->
        </div>
    </div>

    <div id="workout-container">
        <div id="state-label" class="state-label">Preparate</div>
        <div id="exercise-name" class="exercise-name">Cargando...</div>
        
        <div id="video-box" class="video-container">
            <img id="exercise-video" src="" alt="Técnica">
        </div>
        
        <div id="timer-display" class="timer-display">00</div>
        
        <div class="sets-info">
            <span id="current-set">Serie 1</span>
            <span style="opacity: 0.3">/</span>
            <span id="total-sets" style="color: var(--text-dim)">3</span>
        </div>

        <div id="reps-goal" style="color: var(--text-dim); margin-top: 1rem; font-weight: 600;">Objetivo: 12 reps</div>
    </div>

    <!-- Panel de Registro Rápido (Durante Descanso) -->
    <div id="log-overlay">
        <h3 style="margin:0">¿Cómo te fue?</h3>
        <p id="log-info" style="color: var(--text-dim); font-size: 0.9rem">Registrá lo que hiciste en esta serie</p>
        <div class="log-inputs">
            <div class="input-box" id="weight-input-box">
                <label>PESO (KG)</label>
                <input type="number" id="real-weight" placeholder="0">
            </div>
            <div class="input-box">
                <label id="reps-label">REPS</label>
                <input type="number" id="real-reps" placeholder="0">
            </div>
        </div>
        <button onclick="nextStep()" style="width: 100%; margin-top: 1.5rem; background: var(--success); color: white; border: none; padding: 1rem; border-radius: 15px; font-weight: 700;">CONFIRMAR Y SEGUIR</button>
    </div>

    <!-- Panel de Ajuste Inicial (Antes de empezar Fuerza) -->
    <div id="adjust-overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.95); z-index:70; display:none; flex-direction:column; align-items:center; justify-content:center; padding:2rem; backdrop-filter:blur(10px);">
        <h2 style="color:var(--primary); margin-bottom:0.5rem;">AJUSTE DE CARGA</h2>
        <p style="color:var(--text-dim); margin-bottom:2rem;">Confirmá el peso para este ejercicio</p>
        
        <div style="width:100%; max-width:300px; display:flex; flex-direction:column; gap:2rem;">
            <div class="input-box" style="background:rgba(255,255,255,0.1);">
                <label>PESO OBJETIVO (KG)</label>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-top:0.5rem;">
                    <button onclick="changeVal('adj-weight', -2.5)" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:10px; color:white; font-weight:800;">-</button>
                    <input type="number" id="adj-weight" value="0" style="width:80px; background:transparent; border:none; text-align:center; color:white; font-size:1.8rem; font-weight:800;">
                    <button onclick="changeVal('adj-weight', 2.5)" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:10px; color:white; font-weight:800;">+</button>
                </div>
            </div>

            <div class="input-box" style="background:rgba(255,255,255,0.1);">
                <label>REPETICIONES OBJETIVO</label>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-top:0.5rem;">
                    <button onclick="changeVal('adj-reps', -1)" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:10px; color:white; font-weight:800;">-</button>
                    <input type="number" id="adj-reps" value="0" style="width:80px; background:transparent; border:none; text-align:center; color:white; font-size:1.8rem; font-weight:800;">
                    <button onclick="changeVal('adj-reps', 1)" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:10px; color:white; font-weight:800;">+</button>
                </div>
            </div>
        </div>

        <button onclick="confirmAdjustment()" style="width: 100%; max-width:300px; margin-top:3rem; background:var(--success); color:white; border:none; padding:1.2rem; border-radius:50px; font-weight:700; font-size:1.2rem; box-shadow:0 10px 30px rgba(34,197,94,0.3);">¡LISTO, EMPEZAR!</button>
    </div>

    <div id="finish-screen">
        <span class="material-symbols-rounded" style="font-size: 5rem; color: var(--success)">celebration</span>
        <h1>¡Gran Trabajo!</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size: 0.8rem; color: var(--text-dim)">TIEMPO TOTAL</div>
                <div id="final-time" style="font-size: 1.5rem; font-weight: 800">-- min</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; color: var(--text-dim)">CALORÍAS EST.</div>
                <div id="final-calories" style="font-size: 1.5rem; font-weight: 800">-- kcal</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; color: var(--text-dim)">HIDRATACIÓN</div>
                <div style="font-size: 1.2rem; font-weight: 600">~600ml</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; color: var(--text-dim)">PRÓX. SESIÓN</div>
                <div style="font-size: 1.2rem; font-weight: 600">Mañana</div>
            </div>
        </div>
        <button onclick="window.location.href='/'" style="background: var(--primary); color: white; border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: 700;">FINALIZAR</button>
    </div>

    <script>
        // Controles de Cardio
        const cardioControls = document.createElement('div');
        cardioControls.id = 'cardio-controls';
        cardioControls.innerHTML = `
            <div id="pause-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:60; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
                <h2 style="font-size:2rem; margin-bottom:2rem;">EJERCICIO PAUSADO</h2>
                <div style="display:flex; gap:1.5rem;">
                    <button onclick="resumeCardio()" style="background:var(--success); color:white; border:none; padding:1.5rem 2rem; border-radius:50px; font-weight:700; display:flex; align-items:center; gap:0.5rem;">
                        <span class="material-symbols-rounded">play_arrow</span> CONTINUAR
                    </button>
                    <button onclick="finishCardioManually()" style="background:var(--danger); color:white; border:none; padding:1.5rem 2rem; border-radius:50px; font-weight:700; display:flex; align-items:center; gap:0.5rem;">
                        <span class="material-symbols-rounded">stop</span> FINALIZAR
                    </button>
                </div>
            </div>
            <button id="pause-btn" onclick="pauseCardio()" style="display:none; position:fixed; bottom:3rem; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); padding:1rem 2rem; border-radius:50px; font-weight:600; z-index:40; backdrop-filter:blur(5px);">
                PAUSAR EJERCICIO
            </button>
        `;
        document.body.appendChild(cardioControls);

        const routineId = new URLSearchParams(window.location.search).get('id');
        let routineData = null;
        let currentExerciseIndex = 0;
        let currentSet = 1;
        let timerSeconds = 0;
        let timerInterval = null;
        let state = 'PREP'; 
        let totalWorkoutSeconds = 0;
        let effortSeconds = 0;
        let restSeconds = 0;
        let workoutStartTime = null;
        let isPaused = false;

        const synth = window.speechSynthesis;
        function speak(text) {
            if (synth.speaking) synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Prioridad: 1. Voces Naturales/Google, 2. Latino, 3. Neutral
            const preferredVoice = voices.find(v => (v.name.includes('Google') || v.name.includes('Natural')) && v.lang.includes('es')) ||
                                   voices.find(v => v.lang.includes('es-MX') || v.lang.includes('es-AR') || v.lang.includes('es-419')) ||
                                   voices.find(v => v.lang.includes('es'));

            if (preferredVoice) msg.voice = preferredVoice;
            msg.lang = 'es-MX';
            msg.rate = 0.95; 
            msg.pitch = 1;
            window.speechSynthesis.speak(msg);
        }

        // --- Spotify Integration ---
        async function updateSpotifyBar() {
            try {
                const response = await fetch('/api/spotify/status/');
                const data = await response.json();
                
                const statusEl = document.querySelector('.spotify-status');
                const trackEl = document.querySelector('.spotify-track');
                const barEl = document.getElementById('spotify-bar');

                if (data.track_name) {
                    statusEl.innerText = data.is_playing ? 'SONANDO EN ' + data.device_name.toUpperCase() : 'PAUSADO';
                    trackEl.innerText = `${data.track_name} - ${data.artist_name}`;
                    barEl.onclick = openPlaylists; 
                } else if (data.is_connected) {
                    statusEl.innerText = 'SPOTIFY CONECTADO';
                    trackEl.innerText = 'Toca para elegir música';
                    barEl.onclick = openPlaylists;
                }
            } catch (err) {
                console.error('Spotify status error:', err);
            }
        }
        setInterval(updateSpotifyBar, 5000);

        async function openPlaylists() {
            const modal = document.getElementById('playlist-modal');
            const container = document.getElementById('playlists-container');
            modal.style.display = 'flex';
            container.innerHTML = '<p style="text-align:center">Cargando tus listas...</p>';

            try {
                const response = await fetch('/api/spotify/playlists/');
                const data = await response.json();
                
                container.innerHTML = '';
                data.playlists.forEach(pl => {
                    const item = document.createElement('div');
                    item.className = 'playlist-item';
                    item.onclick = () => playPlaylist(pl.uri);
                    item.innerHTML = `
                        <img src="${pl.images[0]?.url || ''}" alt="">
                        <div style="flex:1">
                            <div style="font-weight:600">${pl.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-dim)">${pl.tracks.total} canciones</div>
                        </div>
                        <span class="material-symbols-rounded" style="color:var(--primary)">play_circle</span>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = '<p>Error al cargar playlists.</p>';
            }
        }

        function closePlaylists() {
            document.getElementById('playlist-modal').style.display = 'none';
        }

        async function playPlaylist(uri, silent = false) {
            try {
                const resp = await fetch(`/api/spotify/play-playlist/${uri}/`);
                const data = await resp.json();
                if (data.status === 'ok') {
                    if (!silent) closePlaylists();
                    setTimeout(updateSpotifyBar, 1000);
                } else {
                    console.warn('Spotify play failed:', data.message);
                    if (!silent) alert('No se pudo iniciar la música. Asegúrate de tener Spotify abierto.');
                }
            } catch (err) { console.error('Spotify play error:', err); }
        }

        async function init() {
            if (!routineId) return window.location.href = '/';
            
            // Auto-play silencioso al iniciar (sin abrir el modal)
            setTimeout(async () => {
                try {
                    const response = await fetch('/api/spotify/playlists/');
                    const data = await response.json();
                    if (data.playlists && data.playlists.length > 0) {
                        playPlaylist(data.playlists[0].uri, true);
                    }
                } catch (err) { console.error(err); }
            }, 2000); // Damos un pequeño respiro al cargar

            try {
                const resp = await fetch(`/api/rutinas/${routineId}/`);
                routineData = await resp.json();
                
                if (!routineData.ejercicios || routineData.ejercicios.length === 0) {
                    alert('Esta rutina aún no tiene ejercicios. Agregalos desde "Mis Rutinas".');
                    window.location.href = '/';
                    return;
                }

                workoutStartTime = new Date();
                startStatePrep();
                setInterval(() => { 
                    if(!isPaused) {
                        totalWorkoutSeconds++; 
                        if (state === 'WORK') effortSeconds++;
                        if (state === 'REST') restSeconds++;
                    }
                }, 1000);
            } catch (err) { alert('Error al cargar rutina'); }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            const er = routineData.ejercicios[currentExerciseIndex];
            const ex = er.ejercicio_detalles;
            
            document.getElementById('exercise-name').innerText = ex.nombre;
            document.getElementById('current-set').innerText = `Serie ${currentSet}`;
            document.getElementById('total-sets').innerText = er.series;
            
            // Reloj MM:SS
            document.getElementById('timer-display').innerText = formatTime(timerSeconds);
            
            const videoBox = document.getElementById('video-box');
            if (ex.video_url) {
                videoBox.style.display = 'block';
                document.getElementById('exercise-video').src = ex.video_url;
            } else {
                videoBox.style.display = 'none';
            }

            const isCardio = ex.tipo === 'CARDIO';
            const goalText = isCardio ? `${er.repeticiones} min` : `${er.repeticiones} reps`;
            document.getElementById('reps-goal').innerText = `Objetivo: ${goalText}`;
            document.getElementById('reps-label').innerText = isCardio ? 'MINUTOS' : 'REPS';
            document.getElementById('weight-input-box').style.display = isCardio ? 'none' : 'block';
            
            document.getElementById('pause-btn').style.display = (isCardio && state === 'WORK') ? 'block' : 'none';

            document.body.className = `state-${state.toLowerCase()}`;
            document.getElementById('state-label').innerText = 
                state === 'PREP' ? 'Preparate' : (state === 'WORK' ? '¡Dale!' : 'Descanso');
        }

        function startTimer(seconds, onComplete, countUp = false) {
            clearInterval(timerInterval);
            timerSeconds = seconds;
            updateUI();
            timerInterval = setInterval(() => {
                if (isPaused) return;

                if (countUp) {
                    timerSeconds++;
                    // Motivador cada 5 minutos de esfuerzo real
                    if (effortSeconds > 0 && effortSeconds % 300 === 0) {
                        const mins = Math.floor(effortSeconds / 60);
                        speak(`¡Excelente! Llevas ${mins} minutos de esfuerzo real en ${routineData.ejercicios[currentExerciseIndex].ejercicio.nombre}.`);
                    }
                } else {
                    timerSeconds--;
                }

                updateUI();
                
                if (state === 'WORK' && !countUp && timerSeconds === 10) speak("Últimos 10 segundos.");
                if (state === 'REST' && timerSeconds === 5) speak("Preparate.");

                if (!countUp && timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    onComplete();
                }
            }, 1000);
        }

        function pauseCardio() {
            isPaused = true;
            document.getElementById('pause-overlay').style.display = 'flex';
            fetch('/api/spotify/pause/').catch(console.error);
            speak("Ejercicio en pausa.");
        }

        function resumeCardio() {
            isPaused = false;
            document.getElementById('pause-overlay').style.display = 'none';
            fetch('/api/spotify/play/').catch(console.error);
            speak("Continuamos.");
        }

        function finishCardioManually() {
            isPaused = false;
            document.getElementById('pause-overlay').style.display = 'none';
            nextStep();
        }

        function changeVal(id, delta) {
            const el = document.getElementById(id);
            let val = parseFloat(el.value) || 0;
            val = Math.max(0, val + delta);
            el.value = val;
        }

        function confirmAdjustment() {
            const er = routineData.ejercicios[currentExerciseIndex];
            // Sobrescribimos temporalmente los objetivos para esta sesión
            er.repeticiones = parseInt(document.getElementById('adj-reps').value);
            er.peso_sugerido = parseFloat(document.getElementById('adj-weight').value); 
            
            document.getElementById('adjust-overlay').style.display = 'none';
            isPaused = false;
            updateUI();
            startTimer(5, startStateWork); // Iniciamos cuenta regresiva de 5s tras ajustar
        }

        function startStatePrep() {
            state = 'PREP';
            isPaused = false;
            const er = routineData.ejercicios[currentExerciseIndex];
            const ex = er.ejercicio;

            // Si es Fuerza y es la primera serie, pausamos para ajustar
            if (ex.tipo === 'FUERZA' && currentSet === 1) {
                isPaused = true;
                document.getElementById('adj-weight').value = er.peso_sugerido || 0;
                document.getElementById('adj-reps').value = er.repeticiones;
                document.getElementById('adjust-overlay').style.display = 'flex';
                speak(`Ajustá la carga para ${ex.nombre}.`);
                return;
            }

            speak(`Próximo ejercicio: ${ex.nombre}.`);
            document.getElementById('log-overlay').classList.remove('active');
            startTimer(5, startStateWork);
        }

        function startStateWork() {
            state = 'WORK';
            effortSeconds = 0;
            const er = routineData.ejercicios[currentExerciseIndex];
            speak("¡Comenzamos!");
            fetch('/api/spotify/play/').catch(console.error);
            
            if (er.ejercicio.tipo === 'CARDIO') {
                startTimer(0, null, true); 
            } else {
                startTimer(0, null, true); 
            }
        }

        async function nextStep() {
            if (state === 'WORK') {
                state = 'REST';
                restSeconds = 0; // Reset para el descanso actual
                speak("¡Tiempo! Gran trabajo. Registrá los datos de la serie.");
                fetch('/api/spotify/pause/').catch(console.error);
                
                // Si es cardio, no mostramos el overlay de registro manual, guardamos directo
                if (routineData.ejercicios[currentExerciseIndex].ejercicio.tipo === 'CARDIO') {
                    saveLog();
                    advanceWorkout();
                } else {
                    document.getElementById('log-overlay').classList.add('active');
                    const er = routineData.ejercicios[currentExerciseIndex];
                    startTimer(er.descanso_segundos || 60, () => {
                        saveLog();
                        advanceWorkout();
                    });
                }
            } else if (state === 'REST') {
                saveLog();
                advanceWorkout();
            }
        }

        async function saveLog() {
            const er = routineData.ejercicios[currentExerciseIndex];
            const logData = {
                ejercicio: er.ejercicio.id,
                series_completadas: currentSet,
                repeticiones_reales: document.getElementById('real-reps').value || (er.ejercicio.tipo === 'CARDIO' ? 1 : er.repeticiones),
                peso_utilizado: document.getElementById('real-weight').value || 0,
                tiempo_esfuerzo_segundos: effortSeconds,
                tiempo_descanso_segundos: restSeconds,
                calorias_estimadas: Math.floor((effortSeconds / 60) * 8)
            };
            
            fetch('/api/logs/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(logData)
            }).catch(console.error);
        }

        function advanceWorkout() {
            const er = routineData.ejercicios[currentExerciseIndex];
            if (currentSet < er.series) {
                currentSet++;
                startStatePrep();
            } else if (currentExerciseIndex < routineData.ejercicios.length - 1) {
                currentExerciseIndex++;
                currentSet = 1;
                startStatePrep();
            } else {
                finishWorkout();
            }
        }

        function finishWorkout() {
            state = 'FINISH';
            document.getElementById('log-overlay').classList.remove('active');
            document.getElementById('finish-screen').style.display = 'flex';
            document.getElementById('final-time').innerText = Math.floor(totalWorkoutSeconds/60) + " min";
            const cals = Math.floor((totalWorkoutSeconds/60) * 8); 
            document.getElementById('final-calories').innerText = cals + " kcal";
            speak(`¡Entrenamiento completado! Quemaste aproximadamente ${cals} calorías. ¡A hidratarse!`);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const mc = new Hammer(document.body);
        mc.on("tap", (ev) => {
            if (ev.target.tagName !== 'BUTTON' && ev.target.tagName !== 'INPUT') {
                if (state === 'WORK' && routineData.ejercicios[currentExerciseIndex].ejercicio.tipo !== 'CARDIO') {
                    nextStep();
                }
            }
        });

        init();

    </script>
</body>
</html>
