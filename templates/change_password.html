<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cambiar Contraseña - GIM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">GIM.APP</div>
        <h2 style="margin-bottom: 1rem">Nueva Contraseña</h2>
        <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem">Por seguridad, debes elegir una contraseña personal para continuar.</p>
        
        <form id="change-form">
            <div class="input-group">
                <label>Nueva Contraseña</label>
                <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirm" required minlength="6">
            </div>
            <button type="submit" class="btn">GUARDAR Y EMPEZAR</button>
        </form>
    </div>

    <script>
        document.getElementById('change-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm').value;
            
            if (password !== confirmPass) {
                alert('Las contraseñas no coinciden');
                return;
            }

            const formData = new FormData();
            formData.append('password', password);

            const response = await fetch('/change-password/', {
                method: 'POST',
                headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                body: formData
            });

            const data = await response.json();
            if (data.status === 'ok') {
                alert('Contraseña actualizada con éxito');
                window.location.href = '/';
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
