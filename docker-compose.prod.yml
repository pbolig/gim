services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    restart: always

  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/code/static
    depends_on:
      - db
    env_file: .env
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8080:443"
      - "8081:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/static
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume: